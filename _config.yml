title: Dübi Style Outlet
description: Premium fashion outlet with unbeatable deals. Discover top brands at discounted prices.
url: https://kavir1698.github.io #"https://duebi-style.ch"
baseurl: /duebi-style-website #""
lang: en

author:
  name: Dübi Style Outlet
  email: info@duebi-style.ch

collections:
  products:
    output: true
    permalink: /products/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: products
    values:
      layout: product

sass:
  style: compressed
  sourcemap: never

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - instruction.md
  - README.md
