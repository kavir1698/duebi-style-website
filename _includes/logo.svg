<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ED7CD"/>
      <stop offset="100%" stop-color="#4ED7CD"/>
    </linearGradient>
  </defs>

  <!-- D -->
  <text x="10" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">D</text>

  <!-- ü -->
  <text x="72" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">ü</text>

  <!-- b -->
  <text x="130" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">b</text>

  <!-- The % mark inside/next to b -->
  <g class="brand-percent" transform="translate(175, 18)">
    <!-- Teal circle -->
    <circle cx="28" cy="28" r="24" fill="none" stroke="#4ED7CD" stroke-width="5"/>
    <!-- / (Pink slash) -->
    <line x1="10" y1="46" x2="46" y2="10" stroke="#FF3F6A" stroke-width="7" stroke-linecap="round"/>
    <!-- Left dot (top) -->
    <circle cx="28" cy="18" r="4" fill="#4ED7CD"/>
    <!-- Right dot (bottom) -->
    <circle cx="28" cy="38" r="4" fill="#4ED7CD"/>
  </g>

  <!-- i -->
  <text x="230" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">i</text>

  <!-- S -->
  <text x="260" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">S</text>

  <!-- t -->
  <text x="316" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">t</text>

  <!-- y -->
  <text x="362" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">y</text>

  <!-- l -->
  <text x="416" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">l</text>

  <!-- e -->
  <text x="444" y="92" font-family="'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#4ED7CD" letter-spacing="2">e</text>
</svg>
